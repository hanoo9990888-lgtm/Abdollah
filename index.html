<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مختبر عبدالله كريري الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f1f5f9;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            margin: 0;
            height: 100vh;
            width: 100vw;
        }
        #game-area {
            width: 100%;
            height: 100%;
            position: relative;
            background-image: 
                linear-gradient(rgba(148, 163, 184, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        .magnet {
            width: 160px;
            height: 60px;
            display: flex;
            cursor: grab;
            position: absolute;
            z-index: 50;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            border-radius: 12px;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform, left, top;
        }

        .pole {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 1.8rem;
            pointer-events: none;
        }
        .pole-n { background: linear-gradient(135deg, #ef4444, #991b1b); border-radius: 0 12px 12px 0; }
        .pole-s { background: linear-gradient(135deg, #3b82f6, #1e40af); border-radius: 12px 0 0 12px; }
        
        .item {
            width: 65px;
            height: 65px;
            font-size: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            position: absolute;
            z-index: 10;
            will-change: left, top;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .item.locked {
            z-index: 60;
            transition: none;
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 4px solid #3b82f6;
            z-index: 100;
            width: 90%;
            max-width: 550px;
            pointer-events: none;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 0 20px;
        }
        
        .btn {
            padding: 14px 24px;
            border-radius: 20px;
            color: white;
            font-weight: 900;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            transition: all 0.1s;
            flex: 1;
            max-width: 150px;
            text-align: center;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #fbbf24;
            border-radius: 50%;
            pointer-events: none;
            z-index: 200;
            animation: spark 0.5s ease-out forwards;
        }
        @keyframes spark {
            to { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        .shake { animation: shake-anim 0.2s infinite; }
        @keyframes shake-anim {
            0% { transform: translate(0,0); }
            50% { transform: translate(-3px, 2px); }
            100% { transform: translate(3px, -2px); }
        }
    </style>
</head>
<body>

<div id="game-area">
    <div class="ui-panel text-center">
        <h2 class="text-xl font-black text-blue-700">مختبر عبدالله كريري الذكي 🧪</h2>
        <p id="status" class="text-sm font-bold text-slate-500">استكشف قوة الجذب المغناطيسي المذهلة!</p>
    </div>

    <!-- المغناطيسات -->
    <div id="mag1" class="magnet" style="top: 30%; left: 15%;">
        <div class="pole pole-s">ج</div>
        <div class="pole pole-n">ش</div>
    </div>

    <div id="mag2" class="magnet" style="top: 30%; left: 60%;">
        <div class="pole pole-s">ج</div>
        <div class="pole pole-n">ش</div>
    </div>

    <!-- القطع -->
    <div class="item" style="bottom: 120px; left: 10%;" data-magnetic="true">📎</div>
    <div class="item" style="bottom: 120px; left: 25%;" data-magnetic="true">🔑</div>
    <div class="item" style="bottom: 120px; left: 40%;" data-magnetic="true">🔩</div>
    <div class="item" style="bottom: 120px; left: 55%;" data-magnetic="true">🪙</div>
    <div class="item" style="bottom: 120px; left: 70%;" data-magnetic="false">🧶</div>
    <div class="item" style="bottom: 120px; left: 85%;" data-magnetic="false">✏️</div>

    <div class="controls">
        <button onclick="flip('mag1')" class="btn bg-red-600">قلب الأحمر</button>
        <button onclick="flip('mag2')" class="btn bg-blue-600">قلب الأزرق</button>
        <button onclick="location.reload()" class="btn bg-slate-800">إعادة ضبط</button>
    </div>
</div>

<script>
    let active = null;
    let dragOffset = { x: 0, y: 0 };
    const stuckItems = new Map(); // التخزين: Item DOM -> { mag: DOM, dx: num, dy: num }

    function flip(id) {
        const m = document.getElementById(id);
        const p = Array.from(m.children);
        m.style.transform = 'scale(0.8) rotateY(90deg)';
        setTimeout(() => {
            m.innerHTML = '';
            m.appendChild(p[1]);
            m.appendChild(p[0]);
            m.style.transform = 'scale(1) rotateY(0deg)';
            updateStuck(m); 
        }, 150);
    }

    function onStart(e) {
        const t = e.touches ? e.touches[0] : e;
        const target = e.target.closest('.magnet, .item');
        if (!target) return;

        active = target;
        const r = target.getBoundingClientRect();
        dragOffset.x = t.clientX - r.left;
        dragOffset.y = t.clientY - r.top;

        if (stuckItems.has(target)) {
            target.classList.remove('locked');
            stuckItems.delete(target);
        }

        active.style.zIndex = 1000;
        active.classList.remove('shake');
    }

    function onMove(e) {
        if (!active) return;
        if (e.cancelable) e.preventDefault();
        
        const t = e.touches ? e.touches[0] : e;
        active.style.left = (t.clientX - dragOffset.x) + 'px';
        active.style.top = (t.clientY - dragOffset.y) + 'px';

        if (active.classList.contains('magnet')) {
            updateStuck(active);
        }
        
        processPhysics();
    }

    function updateStuck(mag) {
        const mR = mag.getBoundingClientRect();
        stuckItems.forEach((data, item) => {
            if (data.mag === mag) {
                item.style.left = (mR.left + data.dx) + 'px';
                item.style.top = (mR.top + data.dy) + 'px';
            }
        });
    }

    function processPhysics() {
        const status = document.getElementById('status');
        const mags = [document.getElementById('mag1'), document.getElementById('mag2')];
        const items = document.querySelectorAll('.item');

        const r1 = mags[0].getBoundingClientRect();
        const r2 = mags[1].getBoundingClientRect();
        
        const dxM = r1.left - r2.left;
        const dyM = r1.top - r2.top;
        const distM = Math.sqrt(dxM*dxM + dyM*dyM);

        if (distM < 200) {
            const p1_right = mags[0].children[1].innerText;
            const p2_left = mags[1].children[0].innerText;

            if (p1_right === p2_left) {
                mags[0].classList.add('shake');
                mags[1].classList.add('shake');
                status.innerText = "أقطاب متشابهة! تنافر حقيقي 💨";
                if (distM < 160) {
                    const push = (160 - distM) * 0.4;
                    if (active === mags[0]) mags[1].style.left = (r2.left + push) + 'px';
                    else if (active === mags[1]) mags[0].style.left = (r1.left - push) + 'px';
                    updateStuck(mags[0]); updateStuck(mags[1]);
                }
            } else {
                mags[0].classList.remove('shake');
                mags[1].classList.remove('shake');
                if (distM < 165 && active) {
                    status.innerText = "أقطاب مختلفة! تجاذب قوي ❤️";
                    const gap = r2.left - r1.right;
                    if (Math.abs(r1.top - r2.top) < 40 && Math.abs(gap) < 20) {
                        if (active === mags[0]) mags[1].style.left = r1.right + 'px';
                        else mags[0].style.left = (r2.left - r1.width) + 'px';
                        mags[1].style.top = mags[0].style.top;
                        updateStuck(mags[0]); updateStuck(mags[1]);
                    }
                }
            }
        } else {
            mags[0].classList.remove('shake');
            mags[1].classList.remove('shake');
        }

        items.forEach(item => {
            if (item === active || item.dataset.magnetic === 'false' || stuckItems.has(item)) return;

            mags.forEach(mag => {
                const iR = item.getBoundingClientRect();
                const mR = mag.getBoundingClientRect();

                const dist = Math.sqrt(
                    Math.pow((iR.left + 32) - (mR.left + 80), 2) +
                    Math.pow((iR.top + 32) - (mR.top + 30), 2)
                );

                if (dist < 90) {
                    item.classList.add('locked');
                    const snapX = iR.left;
                    const snapY = mR.top + (mR.height/2 - iR.height/2);
                    
                    item.style.left = snapX + 'px';
                    item.style.top = snapY + 'px';

                    stuckItems.set(item, {
                        mag: mag,
                        dx: snapX - mR.left,
                        dy: snapY - mR.top
                    });
                    
                    status.innerText = "تجاذب معدني! القطعة ملتصقة 🧲";
                    createSparks(snapX + 30, snapY + 30);
                }
            });
        });
    }

    function createSparks(x, y) {
        for(let i=0; i<6; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = x + 'px';
            s.style.top = y + 'px';
            s.style.setProperty('--dx', (Math.random()*100 - 50) + 'px');
            s.style.setProperty('--dy', (Math.random()*100 - 50) + 'px');
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 500);
        }
        if (navigator.vibrate) navigator.vibrate(15);
    }

    function onEnd() { 
        if (active) active.style.zIndex = active.classList.contains('magnet') ? 50 : 10;
        active = null; 
    }

    window.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    function syncLoop() {
        document.querySelectorAll('.magnet').forEach(updateStuck);
        requestAnimationFrame(syncLoop);
    }
    syncLoop();
</script>
</body>
</html>
